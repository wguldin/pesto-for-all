<div class="block block--green">
    <img
        src="{{ '/assets/images/safe_spoon_pic-400w.png' | relative_url }}"
        srcset="{{ '/assets/images/safe_spoon_pic-400w.png' | relative_url }} 400w,
            {{ '/assets/images/safe_spoon_pic-800w.png' | relative_url }} 800w,
            {{ '/assets/images/safe_spoon_pic-1200w.png' | relative_url }} 1200w,
            {{ '/assets/images/safe_spoon_pic.png' | relative_url }} 1600w"
        sizes="(max-width: 768px) 100vw, 50vw"
        class="block__image"
        alt="Our frozen pesto on the shelf in a freezer at the Safe Spoon"
        loading="lazy"
    />
    <div class="block__text">
        <h2 class="block__headline">The Safe Spoon</h2>
        <p>
            Our pesto is both in the
            <strong>freezer case and on the menu</strong> at
            <a
                href="https://www.sensitivelysweet.com/the-safe-spoon/"
                target="_blank"
                rel="noopener"
                >The Safe Spoon</a
            >!
        </p>
        <p>
            This allergen friendly restaurant is on Sunshine in Springfield. Try
            the &ldquo;Pesto for All&rdquo; sandwich or pickup a resealable
            pouch of frozen pesto &ldquo;half moon&rdquo; pieces while you're
            there.
        </p>
    </div>
    {% include divider.html %}
</div>
